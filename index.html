<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:;base64,=" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Ramp</title>
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

  </head>
  <body>
    <calcite-shell content-behind>
      <calcite-navigation slot="header">
        <calcite-navigation-logo id="header-title" slot="logo" heading="Color Ramp Generator">
          <!-- Dynamically populated -->
        </calcite-navigation-logo>
      </calcite-navigation>

      <calcite-shell-panel slot="panel-start" display-mode="float-content">
        <calcite-action-bar slot="action-bar" expanded>
          <calcite-action data-action-id="layers" icon="layers" text="Layers" text-enabled></calcite-action>
          <calcite-action data-action-id="basemaps" icon="basemap" text="Basemaps" text-enabled></calcite-action>
          <calcite-action data-action-id="legend" icon="legend" text="Legend" text-enabled></calcite-action>
        </calcite-action-bar>

        <calcite-panel heading="Layers" scale="l" data-panel-id="layers" id="layers-panel" closable>
          <calcite-input placeholder="AGOL item ID" id="input">
          </calcite-input>

          <!-- empty label for spacing -->
          <calcite-label class="empty-label"></calcite-label>
          
          <calcite-autocomplete name="layers" placeholder="" id="layer-selector">
          </calcite-autocomplete>
          
          <!-- empty label for spacing -->
          <!-- Our list of item fields-->
          <calcite-label class="empty-label"></calcite-label>
          <calcite-label id="fields-label"></calcite-label>

          <calcite-button slot="footer" id="generate-btn" width="full">Generate Histogram</calcite-button>
        </calcite-panel>

         <calcite-panel heading="Basemaps" scale="l" data-panel-id="basemaps" closed closable>
          <arcgis-basemap-gallery></arcgis-basemap-gallery>
        </calcite-panel>
     
        <calcite-panel heading="Legend" scale="l" data-panel-id="legend" closed closable>
          <arcgis-legend legend-style="classic" reference-element="main-map"></arcgis-legend>
        </calcite-panel>


      </calcite-shell-panel>
      <div class="map-frame" id="main-map"></div>
      
      <calcite-dialog width="l" heading="" id="bottom-dialog" placement="bottom" drag-enabled open resizable>
        <arcgis-slider min="0" max="100" show-range-labels value-labels-display="always" steps="1" value-labels-placement="start" id="slider">
          <arcgis-histogram id="hist"></arcgis-histogram>
          <arcgis-ticks interactive slot="content-end" style="flex:1;" min="0" max="100" mode="count" values="11" show-labels>
          </arcgis-ticks>
        </arcgis-slider>
      </calcite-dialog>
    </calcite-shell>

    <!-- loader for the app, will need to configyure this -->
    <!-- <calcite-loader label="loading" text="Loading..." id="app-loader"></calcite-loader> -->
 
    <script type="module" src="/main.js"></script>
  </body>
</html>
